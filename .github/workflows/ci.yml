name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ulog with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,storage,web,web-dev,testing]"

      - name: Lint (ruff)
        run: ruff check ulog/ tests/

      - name: Format check (ruff)
        run: ruff format --check ulog/ tests/

      - name: Type check (mypy --strict)
        run: mypy --strict ulog/

      - name: Deptry (no missing / unused deps)
        run: deptry .

      - name: Run pytest
        run: pytest -q -m "not slow"

  # Story 7.9 — mechanical guard for NFR-DEP-50 / SC4.
  # If `pyproject.toml` ever lists a runtime dep, the build fails.
  # Opt-in extras (`[storage]`, `[web]`, `[dev]`, etc.) are unaffected.
  regression-gate-zero-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce dependencies = []
        run: |
          # `^dependencies` matches the runtime-deps line; we then assert
          # the value on that line is exactly `[]`.
          if ! grep '^dependencies' pyproject.toml | grep -q '\[\]'; then
            echo "::error::pyproject.toml runtime dependencies must remain []"
            echo "::error::Invariant I2 / NFR-DEP-50 / SC4 — opt-in extras only."
            grep '^dependencies' pyproject.toml
            exit 1
          fi
          echo "OK: dependencies = [] preserved."

  # Story 7.10 — pytest-benchmark in advisory mode for the first 2 v0.5
  # runs (per Decision E3). Won't fail the build until baselines stabilize.
  benchmarks:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,storage,web]"
      - name: Run benchmarks (advisory)
        run: pytest -m slow -q tests/bench_*.py || echo "advisory; non-fatal during first 2 v0.5 runs"
