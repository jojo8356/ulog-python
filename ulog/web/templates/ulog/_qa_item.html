{% comment %}
  QA checklist item — checkbox + label + optional inline link.
  Each label/link carries data-i18n-key so the EN/FR switcher in qa.html
  can swap textContent at runtime without a page reload.
{% endcomment %}
<li>
  <label class="flex items-start gap-2 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50 px-1.5 py-0.5 rounded">
    <input type="checkbox" data-qa-id="{{ id }}" class="mt-0.5 rounded text-emerald-600 focus:ring-emerald-500">
    <span class="flex-1">
      <span data-i18n-key="{{ id }}">{{ label }}</span>
      {% if link_url %}
        <a href="{{ link_url }}" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline text-xs ml-1">[<span data-i18n-key="link-{{ link_text|default:'open' }}">{{ link_text|default:"open" }}</span> ↗]</a>
      {% endif %}
    </span>
  </label>
</li>
