name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ulog with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,storage,web,web-dev,testing]"

      - name: Lint (ruff)
        run: ruff check ulog/ tests/

      - name: Format check (ruff)
        run: ruff format --check ulog/ tests/

      - name: Type check (mypy --strict)
        run: mypy --strict ulog/

      - name: Deptry (no missing / unused deps)
        run: deptry .

      - name: Run pytest
        run: pytest -q -m "not slow"

  # Story 7.9 — mechanical guard for NFR-DEP-50 / SC4.
  # If `pyproject.toml` ever lists a runtime dep, the build fails.
  # Opt-in extras (`[storage]`, `[web]`, `[dev]`, etc.) are unaffected.
  regression-gate-zero-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce dependencies = []
        run: |
          # `^dependencies` matches the runtime-deps line; we then assert
          # the value on that line is exactly `[]`.
          if ! grep '^dependencies' pyproject.toml | grep -q '\[\]'; then
            echo "::error::pyproject.toml runtime dependencies must remain []"
            echo "::error::Invariant I2 / NFR-DEP-50 / SC4 — opt-in extras only."
            grep '^dependencies' pyproject.toml
            exit 1
          fi
          echo "OK: dependencies = [] preserved."

  # Story 7.10 — pytest-benchmark in advisory mode for the first 2 v0.5
  # runs (per Decision E3). Won't fail the build until baselines stabilize.
  benchmarks:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,storage,web]"
      - name: Cache 100K bench fixture
        uses: actions/cache@v4
        with:
          path: tests/fixtures/bench_100k.sqlite
          key: bench-fixture-${{ hashFiles('scripts/seed_bench_fixture.py') }}
      - name: Seed bench fixture
        run: make bench-fixture
      - name: Run benchmarks (advisory)
        run: |
          pytest -m slow -q tests/bench_*.py \
              --benchmark-only --benchmark-min-rounds=5 \
              --benchmark-json=benchmark.json \
              || echo "advisory; non-fatal during first 2 v0.6.4 runs"
      - name: Check 30s gate (advisory)
        run: |
          python -c "
          import json, sys
          data = json.load(open('benchmark.json'))
          for b in data['benchmarks']:
              median_s = b['stats']['median']
              name = b['name']
              if 'separate' in name and median_s > 30.0:
                  print(f'::warning::{name} median {median_s:.1f}s exceeds 30s budget')
              else:
                  print(f'OK: {name} median {median_s:.2f}s')
          " || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results
          path: benchmark.json

  # PRD-v0.6.3 — Cross-browser Playwright matrix for ulog export-html.
  # NFR-COMPAT-60. Linux runner only; Chrome + Firefox + WebKit.
  playwright-cross-browser:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e ".[dev,storage,web,web-dev]"
      - name: Install browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium firefox webkit
      - name: Install OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps
      - name: Run e2e across all 3 browsers
        run: |
          pytest tests/test_export_html_e2e.py -q \
            --browser chromium --browser firefox --browser webkit \
            --tracing=retain-on-failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
